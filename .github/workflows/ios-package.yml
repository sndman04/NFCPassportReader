name: iOS Package

"on":
  pull_request:
  push:
    branches:
      - main
      - master
      - "codex/**"

jobs:
  build:
    name: Build and Privacy Scan
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Build iOS package
        run: |
          DEVELOPER_DIR=/Applications/Xcode.app/Contents/Developer \
          xcodebuild -scheme NFCPassportReader -destination generic/platform=iOS build

      - name: Build iOS tests
        run: |
          DEVELOPER_DIR=/Applications/Xcode.app/Contents/Developer \
          xcodebuild -scheme NFCPassportReader -destination generic/platform=iOS build-for-testing

      - name: Whitespace check
        run: git diff --check

      - name: Privacy diagnostics scan
        run: scripts/privacy_scan.sh
